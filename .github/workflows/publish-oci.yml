name: Publish OCI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v)'
        required: true
        type: string

permissions:
  id-token: write
  attestations: write
  contents: read
  packages: write

env:
  SKILLS_OCI_VERSION: v0.0.11
  REGISTRY: ghcr.io
  SKILL_NAME: otel-instrumentation

jobs:
  publish:
    name: Build & push OCI artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: 'stable'
          cache: false

      - name: Install skills-oci (go install — verified via sum.golang.org)
        run: |
          set -euo pipefail
          go install "github.com/salaboy/skills-oci@${SKILLS_OCI_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Stage skill content
        id: stage
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/${SKILL_NAME}"
          mkdir -p "$STAGE"
          cp SKILL.md "$STAGE/"
          [ -d references ] && cp -R references "$STAGE/"
          [ -d scripts ] && cp -R scripts "$STAGE/"
          echo "dir=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifact
        id: push
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${{ steps.owner.outputs.value }}/skills/${SKILL_NAME}:${{ steps.version.outputs.value }}"
          LOG=$(mktemp)
          skills-oci push --plain "$REF" "${{ steps.stage.outputs.dir }}" | tee "$LOG"
          DIGEST=$(grep -oE 'sha256:[a-f0-9]{64}' "$LOG" | tail -n1)
          if [ -z "$DIGEST" ]; then
            echo "::error::skills-oci did not emit a sha256 digest on stdout"
            exit 1
          fi
          {
            echo "ref=$REF"
            echo "digest=$DIGEST"
            echo "subject=${REGISTRY}/${{ steps.owner.outputs.value }}/skills/${SKILL_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Attest artifact provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ steps.push.outputs.subject }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
